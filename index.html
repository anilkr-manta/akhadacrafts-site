<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Akhada Crafts — Traditional Indian Training Equipment</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    :root{
      --ink:#1a1612; --parchment:#f5f0e8; --accent:#8b4513; --accent-light:#c47a3a;
      --muted:#6b5e4e; --card-bg:#faf7f2; --border:rgba(139,69,19,0.18); --border-light:rgba(139,69,19,0.09);
    }
    *{box-sizing:border-box;margin:0;padding:0}
    html{scroll-behavior:smooth}
    body{font-family:'DM Sans',sans-serif;background:var(--parchment);color:var(--ink);line-height:1.7;font-weight:300}

    /* NAV */
    nav{position:sticky;top:0;background:var(--ink);display:flex;justify-content:space-between;align-items:center;padding:0 28px;height:60px;z-index:50}
    .logo{font-family:'Playfair Display',serif;color:var(--parchment);font-weight:600;letter-spacing:.06em}
    .logo span{color:var(--accent-light)}
    .nav-links{display:flex;gap:20px}
    .nav-links a{color:rgba(245,240,232,.65);font-size:12px;text-transform:uppercase;letter-spacing:.08em}

    /* HERO */
    .hero{display:grid;grid-template-columns:1fr 1fr;min-height:78vh;background:var(--ink);align-items:stretch;overflow:hidden}
    .hero-content{padding:56px 48px;display:flex;flex-direction:column;justify-content:center;color:var(--parchment);z-index:2}
    .hero-eyebrow{color:var(--accent-light);font-size:11px;letter-spacing:.18em;text-transform:uppercase;margin-bottom:14px}
    .hero h1{font-family:'Playfair Display',serif;font-size:44px;line-height:1.05;margin-bottom:14px}
    .hero h1 em{color:var(--accent-light);font-style:italic}
    .hero-body{color:rgba(245,240,232,.78);max-width:520px;margin-bottom:22px}
    .hero-ctas{display:flex;gap:12px;flex-wrap:wrap}
    .cta-primary{background:var(--accent);color:var(--parchment);padding:12px 20px;border-radius:3px;text-transform:uppercase;font-weight:500}
    .cta-ghost{border:1px solid rgba(245,240,232,.18);color:rgba(245,240,232,.78);padding:12px 20px;border-radius:3px}

    /* hero image */
    .hero-img{display:block;overflow:hidden}
    .hero-img img{width:100%;height:100%;object-fit:cover;display:block;filter:sepia(.08) contrast(1.03);opacity:.98}

    /* sections */
    .section{max-width:1100px;margin:0 auto;padding:64px 28px}
    .section-eyebrow{color:var(--accent);font-size:11px;letter-spacing:.18em;text-transform:uppercase;margin-bottom:8px}
    .section-title{font-family:'Playfair Display',serif;font-size:30px;margin-bottom:12px}
    .section-body{color:var(--muted);max-width:680px;line-height:1.8}

    /* craft strip */
    .craft-strip{background:var(--ink);padding:56px 0;color:var(--parchment)}
    .craft-inner{max-width:1100px;margin:0 auto;padding:0 28px;display:grid;grid-template-columns:1fr 1fr;gap:36px;align-items:start}
    .pillar{border-left:2px solid var(--accent);padding:6px 0 6px 12px}
    .pillar-title{font-size:12px;font-weight:500;color:var(--parchment)}
    .pillar-sub{font-size:11px;color:rgba(245,240,232,.5)}

    /* kit card */
    .kit-card{background:var(--card-bg);border:1px solid var(--border);border-radius:4px;overflow:hidden;margin-bottom:20px}
    .kit-photo{width:100%;height:320px;object-fit:cover;display:block}
    .kit-body{padding:28px}
    .kit-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:18px;gap:12px}
    .kit-title{font-family:'Playfair Display',serif;font-size:20px}
    .kit-badge{background:var(--ink);color:var(--accent-light);padding:6px 10px;border-radius:3px;font-size:11px}

    /* grids */
    .weights-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
    .wt{background:white;border:1px solid var(--border);padding:14px;border-radius:4px;text-align:center}
    .wt-lbs{font-family:'Playfair Display',serif;color:var(--accent);font-size:20px}
    .use-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:20px}
    .use-card{background:white;border:1px solid var(--border-light);padding:12px;border-radius:4px}

    /* products */
    .products-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
    .product-card{background:var(--card-bg);border:1px solid var(--border-light);border-radius:4px;overflow:hidden}
    .product-img{width:100%;height:200px;object-fit:cover;display:block}

    /* samtola */
    .samtola-strip{background:var(--ink);padding:56px 0;color:var(--parchment)}
    .samtola-inner{max-width:1100px;margin:0 auto;padding:0 28px;display:grid;grid-template-columns:1.2fr 1fr;gap:32px;align-items:center}
    .samtola-img{width:100%;height:420px;object-fit:cover;border-radius:4px}

    /* library */
    .library-section{background:var(--ink);padding:56px 0;color:var(--parchment)}
    .lib-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
    .lib-card{display:flex;align-items:center;gap:12px;background:rgba(245,240,232,.04);border:1px solid rgba(245,240,232,.08);padding:14px;border-radius:4px}

    /* featured videos */
    .featured-videos{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:18px}
    .featured-card{background:rgba(245,240,232
